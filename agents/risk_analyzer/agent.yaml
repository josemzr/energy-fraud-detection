# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: risk-analyzer
description: |
    Energy fraud Risk Analyser. Delegates the numeric verdict to the governed
    Databricks ML model (energy-theft-detector) and grounds the assessment in
    energy regulations (Azure AI Search). LangGraph agent over the Responses protocol.
metadata:
    tags:
        - LangGraph
        - Energy Fraud
        - Databricks
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: 'gpt-4.1'
    - name: MODEL_SERVING_ENDPOINT
      value: 'https://<databricks-workspace>.azuredatabricks.net/serving-endpoints/energy-theft-detector/invocations'
    - name: MODEL_SERVING_TOKEN
      value: '${MODEL_SERVING_TOKEN}'
    - name: MODEL_SERVING_TIMEOUT
      value: '90'
    - name: AZURE_SEARCH_ENDPOINT
      value: 'https://<search-service>.search.windows.net'
    - name: AZURE_SEARCH_API_KEY
      value: '${AZURE_SEARCH_API_KEY}'
    - name: REGULATIONS_INDEX_NAME
      value: 'regulations-policies'
code_configuration:
    runtime: python_3_13
    entry_point: main.py
    dependency_resolution: remote_build
