# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: forensics
description: |
    Energy fraud Data Forensics agent. Investigates the Lakehouse (smart-meter
    readings + customer profiles) using natural language via the Databricks Genie
    MCP server. LangGraph agent over the Responses protocol.
metadata:
    tags:
        - LangGraph
        - Energy Fraud
        - Databricks Genie
        - MCP
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: 'gpt-4.1'
    - name: DATABRICKS_WORKSPACE_HOSTNAME
      value: '<databricks-workspace>.azuredatabricks.net'
    - name: GENIE_SPACE_ID
      value: '<genie-space-id>'
    - name: GENIE_MCP_TOKEN
      value: '${MODEL_SERVING_TOKEN}'
code_configuration:
    runtime: python_3_13
    entry_point: main.py
    dependency_resolution: remote_build
